name: Daily Trailer Update

on:
  schedule:
    - cron: '0 6 * * *'  # 6am UTC daily
  workflow_dispatch:  # manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily update
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python scripts/daily_update.py

      - name: Group trailers
        run: python -m pipeline.run group-trailers

      - name: Export JSON data
        run: python scripts/export.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add db/trailerdb.db site/public/data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Daily update: $(date -u +%Y-%m-%d)"
          git push
