name: Daily Trailer Update

# DISABLED: The SQLite DB is no longer in the repo (too large for LFS).
# Run daily updates locally: python scripts/daily_update.py
# Then re-export and push: python scripts/export.py && git add site/public/data/ && git push

on:
  workflow_dispatch:  # manual trigger only — no auto schedule

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: |
          echo "Daily updates must be run locally since the DB is not in the repo."
          echo "Run: python scripts/daily_update.py && python scripts/export.py"
          echo "Then commit and push the updated data files."
          exit 1
