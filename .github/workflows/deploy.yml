name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Export database to JSON
        run: python scripts/export.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: site
        run: npm install --legacy-peer-deps

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Copy data to dist
        run: |
          cp -r site/public/data site/dist/data
          cp site/public/favicon.svg site/dist/favicon.svg
          cp site/public/robots.txt site/dist/robots.txt
          cp site/public/llms.txt site/dist/llms.txt
          cp site/public/404.html site/dist/404.html
          cp site/public/sitemap-*.xml site/dist/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
